name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Test, build, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      WORKER_NAME: ${{ vars.WORKER_NAME }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      ZONE_NAME: ${{ vars.ZONE_NAME }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      RECOMMENDATION_QUEUE: ${{ vars.RECOMMENDATION_QUEUE }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Worker types
        run: npm run cf-types

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Render private production configuration
        run: node scripts/render-wrangler-config.mjs

      - name: Apply production D1 migrations
        if: ${{ env.CLOUDFLARE_D1_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_D1_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply graduate_exam_db --remote --config wrangler.production.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.production.jsonc
